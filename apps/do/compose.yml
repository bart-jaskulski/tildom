services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:?set GOOGLE_API_KEY in .env}
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
