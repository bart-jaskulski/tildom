<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mark.tildom</title>
    <style>
      html { background: #fafafa; }
      body { margin: 0; color: #24292e; font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .boot-shell { max-width: 120ch; margin: 0 auto; }
      .boot-tabline { min-height: 48px; display: flex; align-items: center; gap: 3ch; padding: 0 3ch; border-bottom: 1px solid #e1e4e8; font-size: 12px; }
      .boot-brand { color: #d73a49; font-size: 16px; font-weight: 900; }
      .boot-buffer { color: #24292e; }
      .boot-status { display: flex; gap: 1ch; align-items: center; margin: 0; padding: 1.5rem 3ch; font-size: 13px; }
      .boot-path { color: #032f62; }
      .boot-cursor { color: #d73a49; animation: boot-blink 1s steps(2, jump-none) infinite; }
      @keyframes boot-blink { 50% { opacity: 0; } }
      @media (prefers-reduced-motion: reduce) { .boot-cursor { animation: none; } }
    </style>
  </head>
  <body>
    <div id="app">
      <main class="boot-shell" role="status" aria-live="polite">
        <div class="boot-tabline"><span class="boot-brand">tildom</span><span class="boot-buffer">[ bookmarks.db ]</span></div>
        <p class="boot-status"><span class="boot-path">~/mark.db</span><span>opening local library</span><span class="boot-cursor" aria-hidden="true">█</span></p>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
