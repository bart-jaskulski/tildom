services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "${API_PORT:-8788}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      API_ALLOWED_ORIGINS: ${API_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
    restart: unless-stopped

  mark:
    build:
      context: .
      dockerfile: apps/mark/Dockerfile
      args:
        VITE_SYNC_BASE_URL: ${MARK_SYNC_BASE_URL:-http://localhost:8787}
        VITE_API_BASE_URL: ${MARK_API_BASE_URL:-http://localhost:8788}
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped

  sync:
    build:
      context: .
      dockerfile: services/sync/Dockerfile
    ports:
      - "${SYNC_PORT:-8787}:8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      SYNC_STORAGE_ROOT: /app/storage/vaults
      SYNC_APP_IDS: mark,kin
      SYNC_HOSTED_ORIGINS: ${SYNC_HOSTED_ORIGINS:-http://localhost:3000,http://localhost:3002}
    volumes:
      - sync-storage:/app/storage
    restart: unless-stopped

  do:
    profiles:
      - apps
    build:
      context: .
      dockerfile: apps/do/Dockerfile
      args:
        VITE_API_BASE_URL: ${DO_API_BASE_URL:-http://localhost:8788}
    ports:
      - "${DO_APP_PORT:-3001}:3000"
    restart: unless-stopped

  kin:
    profiles:
      - apps
    build:
      context: .
      dockerfile: apps/kin/Dockerfile
      args:
        VITE_SYNC_BASE_URL: ${KIN_SYNC_BASE_URL:-http://localhost:8787}
    ports:
      - "${KIN_APP_PORT:-3002}:3000"
    restart: unless-stopped

volumes:
  sync-storage:
